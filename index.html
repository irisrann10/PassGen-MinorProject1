<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Password Generator</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="container">
  <h1>🔐 PassGen</h1>

  <div class="output-box">
    <input type="text" id="password" readonly placeholder="Your password appears here">
    <button id="copyBtn" title="Copy to clipboard">📋</button>
  </div>
  <div class="copy-msg" id="copyMsg"></div>

  <div class="setting">
    <label for="length">Length: <span id="lengthValue">12</span></label>
    <input type="range" id="length" min="4" max="32" value="12">
  </div>

  <div class="checkbox-group">
    <div>
      <input type="checkbox" id="uppercase" checked>
      <label for="uppercase">Include Uppercase Letters (A-Z)</label>
    </div>
    <div>
      <input type="checkbox" id="lowercase" checked>
      <label for="lowercase">Include Lowercase Letters (a-z)</label>
    </div>
    <div>
      <input type="checkbox" id="numbers" checked>
      <label for="numbers">Include Numbers (0-9)</label>
    </div>
    <div>
      <input type="checkbox" id="symbols">
      <label for="symbols">Include Special Characters (!@#$...)</label>
    </div>
  </div>

  <div class="error" id="errorMsg"></div>

  <button id="generateBtn">Generate Password</button>

  <div class="strength" id="strengthMsg"></div>
</div>

<script src="script.js"></script>
</body>
</html>
